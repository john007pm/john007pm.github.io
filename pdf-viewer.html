<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>PDF Viewer | John Mosley</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  background:#020202;
  color:#eee8dc;
  font-family:"Courier New", monospace;
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;

  background:
    radial-gradient(circle at 82% 12%, rgba(255,0,0,.98), transparent 20%),
    radial-gradient(circle at 72% 26%, rgba(255,120,0,.92), transparent 17%),
    radial-gradient(circle at 61% 31%, rgba(255,220,0,.75), transparent 13%),
    radial-gradient(circle at 52% 34%, rgba(0,140,255,.82), transparent 14%),
    radial-gradient(circle at 45% 55%, rgba(0,255,120,.60), transparent 18%),
    radial-gradient(circle at 88% 70%, rgba(255,0,70,.50), transparent 14%),
    radial-gradient(circle at 70% 82%, rgba(255,70,0,.40), transparent 18%),
    #020202;

  animation:glowMove 10s ease-in-out infinite alternate;

  filter:blur(30px) saturate(240%);
}

@keyframes glowMove{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.08) translate(-25px,-18px);
}

100%{
    transform:scale(1.15) translate(25px,20px);
}

}
  
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(2,2,2,.92);
  backdrop-filter:blur(12px);
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,.18);
}

.topbar a{
  color:#ffb000;
  text-decoration:none;
  letter-spacing:2px;
}

.notice{
  position:sticky;
  top:58px;
  z-index:19;
  padding:14px 18px;
  background:rgba(0,0,0,.78);
  border-bottom:1px solid rgba(255,255,255,.15);
  color:#bfb8aa;
  font-size:13px;
  line-height:1.5;
}

#pdf-container{
  padding:30px 18px;
  overflow-x:hidden;
}

@keyframes glowMove{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.08) translate(-25px,-18px);
}

100%{
    transform:scale(1.15) translate(25px,20px);
}

}
canvas{
  display:block;
  width:100%;
  height:auto;
  background:white;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  pointer-events:none;
}

.watermark{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
  display:grid;
  place-items:center;
  text-align:center;
  color:rgba(0,0,0,.08);
  font-size:clamp(22px, 4vw, 42px);
  font-weight:bold;
  letter-spacing:5px;
  line-height:1.5;
  transform:rotate(-18deg);
}

.corner-mark{
  position:absolute;
  bottom:24px;
  right:24px;
  z-index:6;
  background:rgba(0,0,0,.45);
  color:rgba(255,255,255,.72);
  padding:8px 10px;
  font-size:11px;
  letter-spacing:2px;
}

@media(max-width:800px){
  #pdf-container{
    padding:18px 10px;
  }

  .page-wrap{
  position:relative;
  margin:34px auto;
  padding:0;
  width:88vw;
  max-width:720px;
  background:transparent;
  border:none;
  box-shadow:none;
  border-radius:0;
}

  .watermark{
  position:absolute;
  inset:14px;
  pointer-events:none;
  z-index:5;
  display:grid;
  place-items:center;
  text-align:center;
  color:rgba(0,0,0,.10);
  font-size:34px;
  font-weight:bold;
  letter-spacing:5px;
  line-height:1.5;
  transform:rotate(-18deg);
}

  .corner-mark{
    bottom:14px;
    right:14px;
    font-size:9px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a href="the-way-i-cope.html">← Back to The Way I Cope</a>
</div>

<div class="notice">
  © John Mosley. Portfolio viewing only. Do not copy, save, repost, reuse, distribute, or claim this work without permission.
</div>

<div id="pdf-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});

document.addEventListener("dragstart", function(e){
  e.preventDefault();
});

document.addEventListener("keydown", function(e){
  if((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "p")){
    e.preventDefault();
    alert("This work is protected and may not be saved, printed, or copied.");
  }
});

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

function renderPDF(){
  const container = document.getElementById("pdf-container");
  container.innerHTML = "";

  pdfjsLib.getDocument(file).promise.then(pdf => {
    for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){
      pdf.getPage(pageNum).then(page => {
        const viewport = page.getViewport({ scale: 2 });

        const wrap = document.createElement("div");
        wrap.className = "page-wrap";

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const watermark = document.createElement("div");
        watermark.className = "watermark";
        watermark.innerHTML = "© JOHN MOSLEY<br>PORTFOLIO VIEW ONLY";
        
        const corner = document.createElement("div");
        corner.className = "corner-mark";
        corner.innerHTML = "© John Mosley";

        wrap.appendChild(canvas);
        wrap.appendChild(watermark);
        wrap.appendChild(corner);
        container.appendChild(wrap);

        page.render({
          canvasContext: context,
          viewport: viewport
        });
      });
    }
  });
}

renderPDF();
</script>

</body>
</html>
