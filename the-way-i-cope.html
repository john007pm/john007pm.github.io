<title>The Way I Cope | John Mosley</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    background:#020202;
    color:#eee8dc;
    font-family:"Courier New",monospace;
    overflow-x:hidden;
    position:relative;
}

    body:before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;

    background:
        radial-gradient(circle at 82% 12%, rgba(255,40,0,.98), transparent 20%),
        radial-gradient(circle at 72% 25%, rgba(255,180,0,.95), transparent 16%),
        radial-gradient(circle at 61% 33%, rgba(0,140,255,.85), transparent 15%),
        radial-gradient(circle at 48% 52%, rgba(0,255,140,.55), transparent 18%),
        radial-gradient(circle at 88% 68%, rgba(255,0,80,.45), transparent 15%),
        #020202;

    filter:blur(24px) saturate(220%);
    animation:glowMove 10s ease-in-out infinite alternate;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:60px 30px;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

p{
    color:#bfb8aa;
    line-height:1.7;
}

.back{
    display:inline-block;
    margin-bottom:50px;
    color:#ffb000;
    text-decoration:none;
    letter-spacing:2px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin-top:50px;
}

.preview{
    width:100%;
    height:220px;
    object-fit:cover;
    object-position:top;
    display:block;
    border-bottom:1px solid rgba(255,255,255,.15);
    transition:.4s;
}

.card{
    border:1px solid rgba(255,255,255,.12);
    padding:0;
    background:rgba(18,18,18,.75);
    backdrop-filter:blur(10px);
    transition:.35s;
    text-decoration:none;
    color:#eee8dc;
    overflow:hidden;

    box-shadow:
        0 0 18px rgba(255,180,0,.12),
        0 0 40px rgba(255,60,0,.10),
        0 0 70px rgba(0,140,255,.08);

    border-radius:18px;
}

.card:hover{
    transform:translateY(-8px);

    box-shadow:
        0 0 25px rgba(255,180,0,.35),
        0 0 70px rgba(255,60,0,.28),
        0 0 110px rgba(0,140,255,.18);

    border-color:#ffb000;
}

.card h2{
    margin-top:0;
    font-size:24px;
}

.open{
    color:#ffb000;
    margin-top:20px;
    display:block;
}

    @keyframes glowMove{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.06) translate(-20px,-15px);
}

100%{
    transform:scale(1.12) translate(18px,15px);
}

}
    
</style>
</head>

<body>
